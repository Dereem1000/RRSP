<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Dashboard - Full Screen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }

        .fullscreen-header {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem 2rem;
            border-bottom: 3px solid #ffd700;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .kitchen-title {
            font-size: 3rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin: 0;
        }

        .time-display {
            font-size: 1.5rem;
            opacity: 0.9;
        }

        .stats-row {
            padding: 2rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid transparent;
            border-radius: 20px;
            padding: 2rem;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            height: 180px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .stat-card.pending {
            border-color: #ffc107;
            background: rgba(255, 193, 7, 0.2);
        }

        .stat-card.preparing {
            border-color: #17a2b8;
            background: rgba(23, 162, 184, 0.2);
        }

        .stat-card.ready {
            border-color: #28a745;
            background: rgba(40, 167, 69, 0.2);
        }

        .stat-number {
            font-size: 4rem;
            font-weight: bold;
            line-height: 1;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .stat-label {
            font-size: 1.5rem;
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .orders-section {
            padding: 0 2rem 2rem;
        }

        .section-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 2rem;
            text-align: center;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .order-card {
            background: rgba(255, 255, 255, 0.95);
            color: #333;
            border-radius: 15px;
            margin-bottom: 2rem;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .order-card:hover {
            transform: translateY(-5px);
        }

        .order-header {
            padding: 1.5rem 2rem;
            font-size: 1.8rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-header.pending {
            background: linear-gradient(135deg, #ffc107, #ffb300);
        }

        .order-header.preparing {
            background: linear-gradient(135deg, #17a2b8, #138496);
            color: white;
        }

        .order-header.ready {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .table-number {
            font-size: 2.2rem;
            font-weight: bold;
        }

        .order-time {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .order-body {
            padding: 2rem;
        }

        .order-items {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .order-item {
            background: #f8f9fa;
            margin-bottom: 1rem;
            padding: 1.5rem;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.3rem;
            border-left: 5px solid #dee2e6;
            transition: all 0.3s ease;
        }

        .order-item.item-pending {
            border-left-color: #ffc107;
            background: #fff8e1;
        }

        .order-item.item-preparing {
            border-left-color: #17a2b8;
            background: #e1f5fe;
        }

        .order-item.item-ready {
            border-left-color: #28a745;
            background: #e8f5e8;
        }

        .item-name {
            font-weight: bold;
            flex: 1;
        }

        .item-quantity {
            background: #007bff;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            font-weight: bold;
            margin: 0 1rem;
            min-width: 60px;
            text-align: center;
        }

        .item-status {
            padding: 0.5rem 1.5rem;
            border-radius: 25px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 120px;
        }

        .item-status.pending {
            background: #ffc107;
            color: #333;
        }

        .item-status.preparing {
            background: #17a2b8;
            color: white;
        }

        .item-status.ready {
            background: #28a745;
            color: white;
        }

        .item-status:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .order-actions {
            padding: 1.5rem 2rem;
            background: #f8f9fa;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .order-total {
            font-size: 1.5rem;
            font-weight: bold;
            color: #28a745;
        }

        .mark-ready-btn {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 25px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .mark-ready-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.4);
        }

        .mark-ready-btn:disabled {
            background: #6c757d;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .no-orders {
            text-align: center;
            padding: 4rem;
            font-size: 2rem;
            opacity: 0.7;
        }

        .controls {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 1000;
        }

        .control-btn {
            background: rgba(0, 0, 0, 0.7);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 50%;
            font-size: 1.5rem;
            margin-left: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 60px;
            height: 60px;
        }

        .control-btn:hover {
            background: rgba(0, 0, 0, 0.9);
            transform: scale(1.1);
        }

        .refresh-indicator {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: rgba(40, 167, 69, 0.9);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 25px;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .refresh-indicator.show {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .kitchen-title {
                font-size: 2rem;
            }
            
            .stat-number {
                font-size: 3rem;
            }
            
            .stat-label {
                font-size: 1.2rem;
            }
            
            .section-title {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="fullscreen-header">
        <div class="d-flex justify-content-between align-items-center">
            <div>
                <h1 class="kitchen-title">
                    <i class="fas fa-utensils me-3"></i>
                    KITCHEN DASHBOARD
                </h1>
            </div>
            <div class="text-end">
                <div class="time-display" id="current-time"></div>
                <div class="mt-2">
                    <span class="badge bg-success fs-6" id="status-indicator">ONLINE</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Stats Section -->
    <div class="stats-row">
        <div class="row g-4">
            <div class="col-md-3">
                <div class="stat-card pending">
                    <div class="stat-number" id="pending-count">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card preparing">
                    <div class="stat-number" id="preparing-count">0</div>
                    <div class="stat-label">Preparing</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card ready">
                    <div class="stat-number" id="ready-count">0</div>
                    <div class="stat-label">Ready</div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <div class="stat-number" id="total-count">0</div>
                    <div class="stat-label">Total Orders</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Orders Section -->
    <div class="orders-section">
        <h2 class="section-title">
            <i class="fas fa-fire me-3"></i>
            ACTIVE ORDERS
        </h2>
        <div id="orders-container">
            <!-- Orders will be loaded here -->
        </div>
    </div>

    <!-- Controls -->
    <div class="controls">
        <button class="control-btn" onclick="toggleFullscreen()" title="Toggle Fullscreen">
            <i class="fas fa-expand"></i>
        </button>
        <button class="control-btn" onclick="refreshOrders()" title="Refresh Orders">
            <i class="fas fa-sync-alt"></i>
        </button>
        <button class="control-btn" onclick="goToDesktop()" title="Desktop View">
            <i class="fas fa-desktop"></i>
        </button>
    </div>

    <!-- Refresh Indicator -->
    <div class="refresh-indicator" id="refresh-indicator">
        <i class="fas fa-sync-alt fa-spin me-2"></i>
        Updating...
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let orders = [];
        let refreshInterval;
        let timeInterval;

        $(document).ready(function() {
            loadOrders();
            updateTime();
            
            // Refresh orders every 15 seconds for real-time updates
            refreshInterval = setInterval(loadOrders, 15000);
            
            // Update time every second
            timeInterval = setInterval(updateTime, 1000);
            
            // Auto-enter fullscreen if supported
            if (document.documentElement.requestFullscreen) {
                setTimeout(() => {
                    if (!document.fullscreenElement) {
                        document.documentElement.requestFullscreen().catch(err => {
                            console.log('Fullscreen not available:', err);
                        });
                    }
                }, 1000);
            }
        });

        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { 
                hour12: true, 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            const dateString = now.toLocaleDateString('en-US', { 
                weekday: 'short', 
                month: 'short', 
                day: 'numeric' 
            });
            $('#current-time').html(`${timeString}<br><small>${dateString}</small>`);
        }

        function loadOrders() {
            showRefreshIndicator();
            
            $.get('/api/get_orders')
                .done(function(data) {
                    orders = data.orders.filter(order => 
                        ['pending', 'preparing', 'ready'].includes(order.status)
                    );
                    updateStats();
                    renderOrders();
                    hideRefreshIndicator();
                })
                .fail(function(xhr, status, error) {
                    console.error('Error loading orders:', error);
                    hideRefreshIndicator();
                });
        }

        function updateStats() {
            const pending = orders.filter(o => o.status === 'pending').length;
            const preparing = orders.filter(o => o.status === 'preparing').length;
            const ready = orders.filter(o => o.status === 'ready').length;
            const total = orders.length;
            
            $('#pending-count').text(pending);
            $('#preparing-count').text(preparing);
            $('#ready-count').text(ready);
            $('#total-count').text(total);
        }

        function renderOrders() {
            const container = $('#orders-container');
            container.empty();
            
            if (orders.length === 0) {
                container.html(`
                    <div class="no-orders">
                        <i class="fas fa-check-circle fa-3x mb-3"></i>
                        <div>All caught up! No active orders.</div>
                    </div>
                `);
                return;
            }
            
            // Sort orders by status priority and time
            const sortedOrders = orders.sort((a, b) => {
                const statusPriority = { 'pending': 1, 'preparing': 2, 'ready': 3 };
                if (statusPriority[a.status] !== statusPriority[b.status]) {
                    return statusPriority[a.status] - statusPriority[b.status];
                }
                return new Date(a.created_at) - new Date(b.created_at);
            });
            
            sortedOrders.forEach(order => {
                const orderCard = createOrderCard(order);
                container.append(orderCard);
            });
        }

        function createOrderCard(order) {
            const statusClass = order.status;
            const orderTime = new Date(order.created_at);
            const timeAgo = getTimeAgo(orderTime);
            
            let itemsHtml = '';
            order.items.forEach(item => {
                itemsHtml += `
                    <li class="order-item item-${item.status}">
                        <span class="item-name">${item.name}</span>
                        <span class="item-quantity">${item.quantity}x</span>
                        <button class="item-status ${item.status}" 
                                onclick="updateItemStatus(${item.id}, '${getNextStatus(item.status)}')">
                            ${item.status}
                        </button>
                    </li>
                `;
            });

            return `
                <div class="order-card">
                    <div class="order-header ${statusClass}">
                        <div>
                            <div class="table-number">TABLE ${order.table_number}</div>
                            <div class="order-time">${timeAgo}</div>
                        </div>
                        <div class="text-end">
                            <div style="font-size: 1.2rem;">Order #${order.id}</div>
                            <div style="font-size: 1rem; opacity: 0.9;">
                                ${order.customer_name || 'Walk-in'}
                            </div>
                        </div>
                    </div>
                    <div class="order-body">
                        <ul class="order-items">
                            ${itemsHtml}
                        </ul>
                    </div>
                    <div class="order-actions">
                        <div class="order-total">
                            Total: $${order.total_amount.toFixed(2)}
                        </div>
                        <button class="mark-ready-btn" 
                                onclick="markOrderReady(${order.id})"
                                ${order.status === 'ready' ? 'disabled' : ''}>
                            <i class="fas fa-check-circle me-2"></i>
                            ${order.status === 'ready' ? 'ORDER READY' : 'MARK READY'}
                        </button>
                    </div>
                </div>
            `;
        }

        function getTimeAgo(date) {
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            
            if (diffMins < 1) return 'Just now';
            if (diffMins === 1) return '1 min ago';
            if (diffMins < 60) return `${diffMins} mins ago`;
            
            const diffHours = Math.floor(diffMins / 60);
            if (diffHours === 1) return '1 hour ago';
            return `${diffHours} hours ago`;
        }

        function getNextStatus(currentStatus) {
            const statusFlow = {
                'pending': 'preparing',
                'preparing': 'ready',
                'ready': 'ready'
            };
            return statusFlow[currentStatus] || currentStatus;
        }

        function updateItemStatus(itemId, newStatus) {
            $.ajax({
                url: '/api/update_order_item_status',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    item_id: itemId,
                    status: newStatus
                })
            })
            .done(function(data) {
                if (data.success) {
                    loadOrders(); // Refresh orders
                } else {
                    alert('Error updating item status');
                }
            })
            .fail(function(xhr, status, error) {
                alert('Error updating item status: ' + error);
            });
        }

        function markOrderReady(orderId) {
            $.ajax({
                url: '/api/update_order_status',
                method: 'POST',
                contentType: 'application/json',
                data: JSON.stringify({
                    order_id: orderId,
                    status: 'ready'
                })
            })
            .done(function(data) {
                if (data.success) {
                    loadOrders(); // Refresh orders
                } else {
                    alert('Error updating order status');
                }
            })
            .fail(function(xhr, status, error) {
                alert('Error updating order status: ' + error);
            });
        }

        function refreshOrders() {
            loadOrders();
        }

        function showRefreshIndicator() {
            $('#refresh-indicator').addClass('show');
        }

        function hideRefreshIndicator() {
            setTimeout(() => {
                $('#refresh-indicator').removeClass('show');
            }, 500);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log('Error attempting to enable fullscreen:', err);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function goToDesktop() {
            window.location.href = '/kitchen';
        }

        // Cleanup on page unload
        $(window).on('beforeunload', function() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
            }
            if (timeInterval) {
                clearInterval(timeInterval);
            }
        });

        // Handle fullscreen changes
        document.addEventListener('fullscreenchange', function() {
            const fullscreenBtn = $('.control-btn i.fa-expand, .control-btn i.fa-compress');
            if (document.fullscreenElement) {
                fullscreenBtn.removeClass('fa-expand').addClass('fa-compress');
            } else {
                fullscreenBtn.removeClass('fa-compress').addClass('fa-expand');
            }
        });
    </script>
</body>
</html>
